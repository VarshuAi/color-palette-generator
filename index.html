<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Generator — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">🎨</span>
                <div class="title-col">
                    <h1>Color Palette Generator</h1>
                    <p class="tagline">Generate beautiful harmonized HSL/RGB color scheme cards with hex copy buttons.</p>
                </div>
            </div>
            <div class="badge">utilities</div>

        <main class="workspace-card">

            <div style="text-align: center; margin-top: 24px;">
                <button class="btn" id="btn-generate">Generate New Palette</button>
            </div>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>

    <script src="app.js"></script>

</html>
